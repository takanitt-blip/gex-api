name: Update GEX History

on:
  schedule:
    # 毎日 UTC 19:30 (日本時間 午前4:30) に実行
    # UTCの月〜金曜日（日本時間だと火曜〜土曜の朝）のみ実行
    - cron: '30 19 * * 1-5'
  workflow_dispatch: # 手動実行ボタンを有効にする

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python準備
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ライブラリ取得
        # ★修正: scipyを追加しました
        run: pip install yfinance pandas numpy scipy

      - name: 実行
        run: python update_gex.py

      - name: 履歴を保存
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add gex_history.json
          
          # ★修正: 変更がない場合はcommitをスキップし、エラーで落ちないようにするより安全な書き方
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update GEX history" && git push)
